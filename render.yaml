services:
  - type: web
    name: limen-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: FRONTEND_URLS
        value: https://limen-serve.vercel.app,https://limen-serve*.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
